<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dodge Dash Legends — Offline</title>
<meta name="theme-color" content="#0066FF">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:#000;
    color:#fff;
    font-family:'Segoe UI',Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    user-select:none;
  }
  .container{
    text-align:center;
    padding:40px 28px;
    max-width:420px;
  }
  .icon{font-size:80px;margin-bottom:20px;display:block;}
  h1{
    font-size:36px;font-weight:900;letter-spacing:4px;
    background:linear-gradient(135deg,#0066FF,#00e5ff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:8px;
  }
  .sub{
    font-size:13px;color:#555;letter-spacing:3px;
    text-transform:uppercase;margin-bottom:28px;
  }
  .msg{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:20px 24px;
    font-size:15px;
    color:#aaa;
    line-height:1.6;
    margin-bottom:28px;
  }
  .btn{
    display:inline-block;
    background:linear-gradient(135deg,#0066FF,#00e5ff);
    color:#fff;
    border:none;
    border-radius:12px;
    padding:14px 32px;
    font-size:15px;
    font-weight:800;
    letter-spacing:1.5px;
    text-transform:uppercase;
    cursor:pointer;
    text-decoration:none;
    transition:transform 0.1s,box-shadow 0.1s;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,102,255,0.4);}
  .btn:active{transform:translateY(0);}
  .dots{
    margin-top:32px;
    display:flex;gap:8px;justify-content:center;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:#0066FF;
    animation:pulse 1.4s infinite ease-in-out;
  }
  .dot:nth-child(2){animation-delay:0.2s;}
  .dot:nth-child(3){animation-delay:0.4s;}
  @keyframes pulse{
    0%,80%,100%{transform:scale(0.6);opacity:0.4;}
    40%{transform:scale(1);opacity:1;}
  }
</style>
</head>
<body>
<div class="container">
  <span class="icon">🏎️</span>
  <h1>DODGE DASH</h1>
  <p class="sub">Legends</p>
  <div class="msg">
    <strong style="color:#fff;">You're offline right now.</strong><br><br>
    Check your internet connection and try again. Once you've raced online at least once, the game will also be available offline from your home screen.
  </div>
  <a href="/" class="btn" onclick="location.reload();return false;">🔄 Try Again</a>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>
</body>
</html>
