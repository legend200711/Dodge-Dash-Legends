<!DOCTYPE html>
<html>
<head><title>Icon Generator — Dodge Dash Legends</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px;">
<h2>Dodge Dash Legends — Icon Generator</h2>
<p>Click each button to download the icon, then place all icons inside an <code>icons/</code> folder next to index.html.</p>
<div id="output" style="display:flex;gap:20px;flex-wrap:wrap;margin-top:20px;"></div>
<script>
function drawIcon(size, label) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background — deep blue radial gradient
  const bg = ctx.createRadialGradient(size*0.5, size*0.4, 0, size*0.5, size*0.5, size*0.75);
  bg.addColorStop(0, '#0033cc');
  bg.addColorStop(0.6, '#0011aa');
  bg.addColorStop(1, '#000033');
  ctx.fillStyle = bg;

  // Rounded rect clip
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Speed lines (background streaks)
  ctx.save();
  ctx.globalAlpha = 0.12;
  for (let i = 0; i < 6; i++) {
    const y = size * (0.15 + i * 0.13);
    const w = size * (0.3 + Math.random() * 0.4);
    const x = size * 0.05 + Math.random() * size * 0.2;
    ctx.fillStyle = '#4499ff';
    ctx.fillRect(x, y, w, size * 0.018);
  }
  ctx.restore();

  // Road surface
  const roadW = size * 0.72;
  const roadH = size * 0.32;
  const roadX = (size - roadW) / 2;
  const roadY = size * 0.54;
  const roadGrad = ctx.createLinearGradient(0, roadY, 0, roadY + roadH);
  roadGrad.addColorStop(0, '#333355');
  roadGrad.addColorStop(1, '#111122');
  ctx.fillStyle = roadGrad;
  ctx.beginPath();
  ctx.moveTo(roadX, roadY);
  ctx.lineTo(roadX + roadW, roadY);
  ctx.lineTo(roadX + roadW + size * 0.08, roadY + roadH);
  ctx.lineTo(roadX - size * 0.08, roadY + roadH);
  ctx.closePath();
  ctx.fill();

  // Road dashes
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = size * 0.025;
  ctx.setLineDash([size * 0.08, size * 0.06]);
  ctx.beginPath();
  ctx.moveTo(size * 0.3, roadY + roadH * 0.5);
  ctx.lineTo(size * 0.7, roadY + roadH * 0.5);
  ctx.stroke();
  ctx.setLineDash([]);

  // Car body
  const cx = size * 0.5;
  const cy = size * 0.42;
  const cw = size * 0.52;
  const ch = size * 0.16;

  // Car shadow
  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx, cy + ch * 0.7, cw * 0.45, ch * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Car main body
  const carGrad = ctx.createLinearGradient(cx - cw/2, cy - ch, cx - cw/2, cy + ch*0.5);
  carGrad.addColorStop(0, '#ff4466');
  carGrad.addColorStop(0.5, '#cc1133');
  carGrad.addColorStop(1, '#880022');
  ctx.fillStyle = carGrad;
  // Body shape
  ctx.beginPath();
  ctx.moveTo(cx - cw * 0.5, cy + ch * 0.3);
  ctx.lineTo(cx - cw * 0.45, cy - ch * 0.1);
  ctx.lineTo(cx - cw * 0.2, cy - ch * 0.55);
  ctx.lineTo(cx + cw * 0.2, cy - ch * 0.55);
  ctx.lineTo(cx + cw * 0.45, cy - ch * 0.1);
  ctx.lineTo(cx + cw * 0.5, cy + ch * 0.3);
  ctx.closePath();
  ctx.fill();

  // Car cabin / windshield
  const winGrad = ctx.createLinearGradient(cx, cy - ch * 0.5, cx, cy - ch * 0.05);
  winGrad.addColorStop(0, 'rgba(136,204,255,0.9)');
  winGrad.addColorStop(1, 'rgba(68,136,255,0.5)');
  ctx.fillStyle = winGrad;
  ctx.beginPath();
  ctx.moveTo(cx - cw * 0.17, cy - ch * 0.08);
  ctx.lineTo(cx - cw * 0.14, cy - ch * 0.5);
  ctx.lineTo(cx + cw * 0.14, cy - ch * 0.5);
  ctx.lineTo(cx + cw * 0.17, cy - ch * 0.08);
  ctx.closePath();
  ctx.fill();

  // Wheels
  const wheelR = size * 0.062;
  const wheelY = cy + ch * 0.28;
  [cx - cw * 0.33, cx + cw * 0.33].forEach(wx => {
    // Tyre
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.ellipse(wx, wheelY, wheelR, wheelR * 0.75, 0, 0, Math.PI * 2);
    ctx.fill();
    // Rim
    ctx.fillStyle = '#aaa';
    ctx.beginPath();
    ctx.ellipse(wx, wheelY, wheelR * 0.55, wheelR * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    // Rim spokes
    ctx.strokeStyle = '#666';
    ctx.lineWidth = size * 0.012;
    for (let s = 0; s < 4; s++) {
      const a = (s / 4) * Math.PI;
      ctx.beginPath();
      ctx.moveTo(wx + Math.cos(a) * wheelR * 0.5, wheelY + Math.sin(a) * wheelR * 0.38);
      ctx.lineTo(wx - Math.cos(a) * wheelR * 0.5, wheelY - Math.sin(a) * wheelR * 0.38);
      ctx.stroke();
    }
  });

  // Headlights glow
  ctx.save();
  ctx.globalAlpha = 0.85;
  const headLightGrad = ctx.createRadialGradient(cx + cw*0.38, cy, 0, cx + cw*0.38, cy, size*0.12);
  headLightGrad.addColorStop(0, 'rgba(255,255,180,0.9)');
  headLightGrad.addColorStop(1, 'rgba(255,255,100,0)');
  ctx.fillStyle = headLightGrad;
  ctx.beginPath();
  ctx.arc(cx + cw * 0.38, cy, size * 0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Headlight lens
  ctx.fillStyle = '#ffffcc';
  ctx.beginPath();
  ctx.ellipse(cx + cw * 0.42, cy - ch * 0.05, size * 0.038, size * 0.022, 0, 0, Math.PI * 2);
  ctx.fill();

  // Brake light
  ctx.fillStyle = '#ff2200';
  ctx.beginPath();
  ctx.ellipse(cx - cw * 0.43, cy - ch * 0.05, size * 0.028, size * 0.016, 0, 0, Math.PI * 2);
  ctx.fill();

  // Speed lines over car
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.strokeStyle = '#88aaff';
  ctx.lineWidth = size * 0.015;
  ctx.setLineDash([size * 0.04, size * 0.03]);
  [cy - ch * 0.1, cy + ch * 0.05].forEach(ly => {
    ctx.beginPath();
    ctx.moveTo(cx - cw * 0.8, ly);
    ctx.lineTo(cx - cw * 0.55, ly);
    ctx.stroke();
  });
  ctx.restore();

  // App name text
  const fontSize = Math.max(size * 0.095, 10);
  ctx.font = `900 ${fontSize}px 'Arial Black', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Text shadow / glow
  ctx.shadowColor = '#0066ff';
  ctx.shadowBlur = size * 0.04;
  const textGrad = ctx.createLinearGradient(0, size*0.82, 0, size*0.92);
  textGrad.addColorStop(0, '#ffffff');
  textGrad.addColorStop(1, '#88ccff');
  ctx.fillStyle = textGrad;
  ctx.fillText('DDL', cx, size * 0.88);
  ctx.shadowBlur = 0;

  // Border highlight
  ctx.save();
  const borderGrad = ctx.createLinearGradient(0, 0, size, size);
  borderGrad.addColorStop(0, 'rgba(100,160,255,0.5)');
  borderGrad.addColorStop(0.5, 'rgba(0,102,255,0.1)');
  borderGrad.addColorStop(1, 'rgba(100,160,255,0.3)');
  ctx.strokeStyle = borderGrad;
  ctx.lineWidth = size * 0.025;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();

  return canvas;
}

const output = document.getElementById('output');
const sizes = [
  { size: 512,  name: 'icon-512.png',        label: '512×512' },
  { size: 192,  name: 'icon-192.png',        label: '192×192' },
  { size: 180,  name: 'apple-touch-icon.png',label: '180×180 (Apple)' },
  { size: 48,   name: 'favicon-48.png',      label: '48×48 (favicon preview)' },
];

sizes.forEach(({ size, name, label }) => {
  const canvas = drawIcon(size, label);
  canvas.style.cssText = `border:2px solid #333;border-radius:${size*0.18}px;display:block;`;

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'text-align:center;';

  const p = document.createElement('p');
  p.style.cssText = 'margin:8px 0 4px;font-size:13px;color:#aaa;';
  p.textContent = label;

  const a = document.createElement('a');
  a.download = name;
  a.href = canvas.toDataURL('image/png');
  a.style.cssText = 'display:inline-block;margin-top:8px;padding:6px 14px;background:#0066ff;color:#fff;border-radius:6px;font-size:12px;text-decoration:none;font-weight:700;letter-spacing:1px;';
  a.textContent = '⬇ Download ' + name;

  wrapper.appendChild(canvas);
  wrapper.appendChild(p);
  wrapper.appendChild(a);
  output.appendChild(wrapper);
});

// Also show instructions
const info = document.createElement('div');
info.style.cssText = 'width:100%;margin-top:20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px 20px;font-size:14px;color:#aaa;line-height:1.8;';
info.innerHTML = `
  <strong style="color:#fff;">Instructions:</strong><br>
  1. Download all 3 icons above: <code>icon-512.png</code>, <code>icon-192.png</code>, <code>apple-touch-icon.png</code><br>
  2. Create an <code>icons/</code> folder next to your <code>index.html</code><br>
  3. Place all downloaded icons inside <code>icons/</code><br>
  4. For <code>favicon.ico</code>: rename <code>favicon-48.png</code> to <code>favicon.ico</code> and place it in <code>icons/</code><br>
  5. Deploy everything to GitHub Pages and test with Chrome DevTools → Application → Manifest
`;
output.appendChild(info);
</script>
</body>
</html>
